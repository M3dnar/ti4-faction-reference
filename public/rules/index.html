<title>TI4 Living Rules Reference — freier.fun</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:   #1E1E24; --bg2: #262630; --gold: #C9A845;
  --white: #EFEFEF; --dim: #888899; --border: #3C3C50;
}
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: Arial, sans-serif; }
body { display: flex; flex-direction: column; }

/* ── Top bar ── */
#topbar {
  background: var(--bg2); border-bottom: 2px solid var(--gold);
  padding: .6rem 1.4rem; display: flex; align-items: center; gap: 1.2rem;
  flex-shrink: 0; position: sticky; top: 0; z-index: 10;
}
.back-link {
  color: var(--gold); text-decoration: none; font-size: .82rem;
  font-weight: 700; white-space: nowrap; display: flex; align-items: center; gap: .3rem;
}
.back-link:hover { text-decoration: underline; }
.page-title {
  font-size: .95rem; font-weight: 700; color: var(--white); white-space: nowrap;
}
.nav-links { display: flex; gap: .3rem; margin-left: auto; }
.nav-pill {
  padding: .22rem .65rem; font-size: .75rem; font-weight: 600;
  color: var(--dim); text-decoration: none; border-radius: 4px;
  border: 1px solid var(--border); transition: all .15s; white-space: nowrap;
}
.nav-pill:hover { color: var(--gold); border-color: var(--gold); text-decoration: none; }

/* ── PDF frame ── */
#pdf-frame {
  flex: 1; width: 100%; border: none; min-height: 0;
}
</style>
</head>
<body>

<div id="topbar">
  <a class="back-link" href="/">← Faction Reference</a>

  <div class="nav-links">

  </div>
</div>

  title="TI4 Living Rules Reference">
</iframe>

</body>
